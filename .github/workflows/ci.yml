name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # Security audit FIRST — fail fast on known advisories
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Audit dependencies
        run: cargo audit

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build (bundler target)
        run: wasm-pack build --target bundler --release --out-dir pkg-bundler

      - name: Build (nodejs target)
        run: wasm-pack build --target nodejs --release --out-dir pkg-nodejs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npx tsc

      - name: Run interop tests
        run: npm test

      - name: WASM size check
        run: |
          BUNDLER_SIZE=$(stat -c%s pkg-bundler/stenvault_pqc_bg.wasm)
          NODEJS_SIZE=$(stat -c%s pkg-nodejs/stenvault_pqc_bg.wasm)
          echo "pkg-bundler: $(numfmt --to=iec $BUNDLER_SIZE)"
          echo "pkg-nodejs:  $(numfmt --to=iec $NODEJS_SIZE)"
          # Fail if WASM exceeds 500KB (unexpected bloat)
          if [ "$BUNDLER_SIZE" -gt 512000 ]; then
            echo "::error::pkg-bundler WASM exceeds 500KB ($BUNDLER_SIZE bytes)"
            exit 1
          fi
          if [ "$NODEJS_SIZE" -gt 512000 ]; then
            echo "::error::pkg-nodejs WASM exceeds 500KB ($NODEJS_SIZE bytes)"
            exit 1
          fi
