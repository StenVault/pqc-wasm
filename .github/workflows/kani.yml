name: Kani Verification

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Formal verification (Kani)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Kani installation
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/kani*
            ~/.cargo/bin/cargo-kani
            ~/.kani
          key: kani-${{ runner.os }}-${{ hashFiles('proofs/Cargo.lock') }}
          restore-keys: kani-${{ runner.os }}-

      - name: Install Kani verifier
        run: |
          if ! command -v cargo-kani &> /dev/null; then
            cargo install --locked kani-verifier
            cargo kani setup
          fi

      - name: Run verification proofs
        working-directory: proofs
        run: cargo kani
