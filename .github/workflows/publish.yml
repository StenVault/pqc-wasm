name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write  # OIDC token for npm Trusted Publishing (no NPM_TOKEN needed)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Audit dependencies
        run: cargo audit

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build (bundler target)
        run: wasm-pack build --target bundler --release --out-dir pkg-bundler

      - name: Build (nodejs target)
        run: wasm-pack build --target nodejs --release --out-dir pkg-nodejs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install TypeScript
        run: npm install typescript

      - name: Build TypeScript
        run: npx tsc

      - name: Publish with provenance
        run: npm publish --provenance --access public
